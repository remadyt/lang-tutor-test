name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint • typecheck • test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Compile i18n messages (paraglide)
        run: pnpm messages

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm check

      - name: Dead-code (knip)
        run: pnpm knip --reporter compact

      - name: Type coverage
        run: pnpm type-coverage

      - name: Unit tests
        run: pnpm test:unit:run

      - name: Build
        run: pnpm build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    env:
      GOOGLE_GENERATIVE_AI_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm messages
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
